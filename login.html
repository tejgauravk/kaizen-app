<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Kaizen Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
  <div class="panel-card" style="max-width: 380px; width: 100%; margin-top: 0;">
    <h1 class="h4 fw-bold mb-1" style="color: var(--blue-900);">Kaizen Management System</h1>
    <p class="text-muted small mb-4">Enter the password to continue.</p>

    <form id="loginForm">
      <input type="password" class="form-control mb-3" id="pw" placeholder="Password" autofocus required autocomplete="current-password">
      <button type="submit" class="btn btn-app-primary w-100" id="loginBtn">Sign in</button>
      <div class="text-danger small mt-2 d-none" id="loginError"></div>
    </form>
  </div>
</div>

<script>
  document.getElementById("loginForm").addEventListener("submit", function (e) {
    e.preventDefault();
    var pw = document.getElementById("pw").value;
    var btn = document.getElementById("loginBtn");
    var errEl = document.getElementById("loginError");
    errEl.classList.add("d-none");
    btn.disabled = true;
    btn.textContent = "Signing in…";

    fetch("/api/login", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ password: pw }),
    })
      .then(function (res) {
        if (res.ok) {
          window.location.href = "/index.html";
          return;
        }
        return res.json().then(function (data) {
          errEl.textContent = data.error || "Incorrect password.";
          errEl.classList.remove("d-none");
        });
      })
      .catch(function () {
        errEl.textContent = "Something went wrong. Check your connection and try again.";
        errEl.classList.remove("d-none");
      })
      .finally(function () {
        btn.disabled = false;
        btn.textContent = "Sign in";
      });
  });
</script>
</body>
</html>
